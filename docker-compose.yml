version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: cyber-intel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyber_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-intel-net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cyber-intel-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: cyber_intel
      DB_SYNC: "true"
    ports:
      - "3001:3001"
    networks:
      - cyber-intel-net

networks:
  cyber-intel-net:
    driver: bridge

volumes:
  postgres-data:
